<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="hero-blur">
<div class="overlay">

<div class="admin-container">

    <h2 class="text-center mb-4">Admin Dashboard 📊</h2>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover custom-table">
            <thead class="table-dark text-center">
                <tr>
                    <th>Username</th>
                    <th>News</th>
                    <th>Prediction</th>
                    <th>Confidence</th>
                </tr>
            </thead>

            <tbody>
                {% for row in history %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td class="news-cell">{{ row[1] }}</td>

                    {% if "FAKE" in row[2] %}
                        <td class="text-danger fw-bold">{{ row[2] }}</td>
                    {% else %}
                        <td class="text-success fw-bold">{{ row[2] }}</td>
                    {% endif %}

                    <td>{{ row[3] }}%</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- CHARTS -->
    <h4 class="text-center mt-4">News Prediction Statistics</h4>

    <div class="charts">
        <img src="/{{ bar_chart }}">
        <img src="/{{ pie_chart }}">
    </div>

    <!-- BUTTONS -->
    <div class="text-center mt-4">
        <a href="/download_admin_pdf" class="btn btn-primary me-2">
            Download PDF
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>
    </div>

</div>

</div>
</div>

</body>
</html>
