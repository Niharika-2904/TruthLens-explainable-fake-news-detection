<!DOCTYPE html>
<html>
<head>
    <title>Register - TruthLens</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="hero-blur">

    <div class="overlay">

        <div class="login-card">

            <h2 class="text-center mb-4">Register</h2>

            <form method="POST">

                <input type="text" name="username" placeholder="Username" required 
                class="form-control form-control-lg mb-3">

                <input type="password" name="password" placeholder="Password" required 
                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
                title="Must contain at least 8 characters, one uppercase, one lowercase, one number and one special character"
                class="form-control form-control-lg mb-1">
                <small id="passwordHelp" class="text-danger"></small><br/>

                <button type="submit" class="btn btn-success w-100 mb-3">Register</button>

            </form>

            <div class="text-center">
                <a href="/login" class="back-link">Already have an account? Login</a>
            </div>

        </div>

    </div>

</div>

<script>
document.querySelector("input[name='password']").addEventListener("input", function() {
    let p = this.value;
    let msg = "";
    let color = "red";

    if (p.length < 8) msg = "Minimum 8 characters required";
    else if (!/[A-Z]/.test(p)) msg = "Add at least one uppercase letter";
    else if (!/[a-z]/.test(p)) msg = "Add at least one lowercase letter";
    else if (!/[0-9]/.test(p)) msg = "Add at least one number";
    else if (!/[@$!%*?&]/.test(p)) msg = "Add at least one special character";
    else {
        msg = "Strong password";
        color = "green";
    }

    let help = document.getElementById("passwordHelp");
    help.innerText = msg;
    help.style.color = color;
});
</script>

</body>
</html>
