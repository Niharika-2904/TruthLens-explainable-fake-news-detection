<!DOCTYPE html>
<html>
<head>
    <title>Login - TruthLens</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="hero-blur">

    <div class="overlay">

        <div class="login-card">

            <h2 class="text-center mb-4">Login</h2>

            {% if error %}
                <div class="alert alert-danger text-center">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">

                <input type="text" name="username" placeholder="Username" required class="form-control mb-3">

                <input type="password" name="password" placeholder="Password" required class="form-control mb-4">

                <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

            </form>


            <div class="text-center">
                <a href="/register" class="back-link">New user? Register</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
