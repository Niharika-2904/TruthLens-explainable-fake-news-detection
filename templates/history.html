<!DOCTYPE html>
<html>
<head>
    <title>My History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="hero-blur">
<div class="overlay">

<div class="history-container">

    <h2 class="text-center mb-4">📜 My Prediction History</h2>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-hover align-middle text-center">

            <thead class="table-dark">
                <tr>
                    <th>News</th>
                    <th>Prediction</th>
                    <th>Confidence</th>
                </tr>
            </thead>

            <tbody>
                {% for row in history %}
                <tr>

                    <!-- NEWS -->
                    <td class="text-start">
                        {{ row[0] }}
                    </td>

                    <!-- PREDICTION -->
                    <td>
                        {% if "FAKE" in row[1] %}
                            <span class="badge bg-danger">{{ row[1] }}</span>
                        {% else %}
                            <span class="badge bg-success">{{ row[1] }}</span>
                        {% endif %}
                    </td>

                    <!-- CONFIDENCE -->
                    <td>
                        <span class="badge bg-secondary">{{ row[2] }}%</span>
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="text-center mt-4">

        <a href="/download_user_pdf" class="btn btn-primary me-2">
            ⬇ Download PDF
        </a>

        <br><br>

        <a href="/predict" class="btn btn-outline-light me-2">
            Back
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

</div>

</div>
</div>

</body>
</html>
